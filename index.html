<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>풍산고등학교 6월 급식표</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f5f4f0; color: #1a1a1a; min-height: 100vh; }

  .app { max-width: 900px; margin: 0 auto; padding: 24px 16px 60px; }

  header { margin-bottom: 22px; }
  header h1 { font-size: 22px; font-weight: 600; color: #1a1a1a; }
  header p { font-size: 13px; color: #888; margin-top: 4px; }

  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .dow { text-align: center; font-size: 11px; font-weight: 600; padding: 6px 0 10px; letter-spacing: 0.03em; color: #888; }
  .dow.sun { color: #d94040; }
  .dow.sat { color: #2a7bd4; }

  .day { background: #fff; border-radius: 10px; padding: 6px; min-height: 85px; cursor: pointer; border: 1.5px solid transparent; transition: border-color 0.15s, box-shadow 0.15s; display: flex; flex-direction: column; justify-content: flex-start; }
  .day:hover { border-color: #c8c4bc; }
  .day.empty { background: transparent; cursor: default; border: none; }
  .day.today { border-color: #2a7bd4; }
  .day.selected { border-color: #2d8c5e; background: #f0faf5; box-shadow: 0 0 0 3px rgba(45,140,94,0.1); }
  .day.sun .day-num { color: #d94040; }
  .day.sat .day-num { color: #2a7bd4; }

  .day-num { font-size: 12px; font-weight: 600; color: #555; }
  
  .day-stars-summary { font-size: 10px; margin-top: auto; display: flex; flex-direction: column; gap: 1px; padding-top: 4px; border-top: 1px dashed #f0ede6; }
  .summary-line { display: flex; align-items: center; gap: 2px; color: #666; font-weight: 500; }
  .summary-line.has-stars { color: #f1c40f; font-weight: bold; }

  .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 20px; }
  @media (max-width: 768px) { .main-content { grid-template-columns: 1fr; } }

  .detail, .comments-box { background: #fff; border-radius: 14px; padding: 20px; border: 1px solid #e8e5df; display: flex; flex-direction: column; }

  .detail-header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 16px; }
  .detail-date { font-size: 16px; font-weight: 600; }
  .detail-kcal { font-size: 12px; color: #f0922b; font-weight: 500; }

  .meal-tabs { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .tab { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1.5px solid #e0ddd8; background: transparent; color: #888; transition: all 0.15s; }
  .tab:hover { border-color: #aaa; }
  .tab.active-b { background: #e8f0fa; color: #185ea5; border-color: #185ea5; }
  .tab.active-l { background: #e8f5ec; color: #2d7a4a; border-color: #2d7a4a; }
  .tab.active-d { background: #fef3e5; color: #b5620a; border-color: #b5620a; }
  .tab-stars { font-size: 11px; font-weight: bold; color: #f1c40f; }

  .menu-list { display: flex; flex-direction: column; gap: 5px; }
  .menu-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 12px; background: #f8f7f4; border-radius: 8px; font-size: 13.5px; cursor: pointer; user-select: none; }
  .menu-row:hover { background: #f1f0ec; }
  .menu-row.favorite { background: #fffdeb; border: 1px solid #fcebb6; }
  .menu-left { display: flex; align-items: center; gap: 8px; }
  .star-icon { color: #ccc; font-size: 14px; transition: color 0.15s; }
  .menu-row.favorite .star-icon { color: #f1c40f; }
  .menu-name { color: #1a1a1a; }
  .allergy { font-size: 10px; color: #bbb; font-weight: 400; margin-left: 8px; flex-shrink: 0; }
  .no-meal { text-align: center; padding: 2rem; color: #bbb; font-size: 13px; }

  .comments-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
  .comment-list { flex-grow: 1; min-height: 180px; max-height: 280px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; padding-right: 4px; }
  .comment-item { background: #f8f7f4; padding: 8px 12px; border-radius: 8px; font-size: 13px; line-height: 1.4; }
  .comment-meta { display: flex; justify-content: space-between; font-size: 11px; color: #888; margin-bottom: 3px; font-weight: 500; }
  .comment-input-wrap { display: flex; gap: 6px; }
  .comment-input { flex-grow: 1; padding: 8px 12px; border: 1px solid #e0ddd8; border-radius: 8px; font-size: 13px; outline: none; }
  .comment-input:focus { border-color: #a0a0a0; }
  .comment-btn { padding: 0 14px; background: #2d8c5e; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; }
  .comment-btn:hover { background: #24704b; }
  .no-comments { text-align: center; color: #bbb; font-size: 12px; margin: auto 0; }

  .legend { display: flex; gap: 16px; margin-top: 20px; font-size: 11px; color: #aaa; }
  .legend-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
</style>

    </div>
  </div>

const favorites = JSON.parse(localStorage.getItem('pungsan_meal_favs')) || {};

const adjs = ["맛있는", "배고픈", "배부른", "행복한", "급식소", "든든한", "신선한", "매콤한"];
const nouns = ["사과", "치킨", "감자", "까스", "수박", "찌개", "튀김", "도넛"];
let myNick = localStorage.getItem('pungsan_my_nick');
if (!myNick) {
  myNick = adjs[Math.floor(Math.random()*adjs.length)] + " " + nouns[Math.floor(Math.random()*nouns.length)];
  localStorage.setItem('pungsan_my_nick', myNick);
}

let currentRoom = null;
let roomStorage = null;
let client = null;

function cleanName(s) { return s.replace(/\([\d\.]+\)\s*$/, '').trim(); }
function getAllergy(s) { const m = s.match(/\(([\d\.]+)\)\s*$/); return m ? m[1] : null; }

const DOW = ['일','월','화','수','목','금','토'];
const FIRST_DOW = 1;
const _now = new Date();
const TODAY = (_now.getFullYear() === 2026 && _now.getMonth() === 5) ? _now.getDate() : null;
let selectedDay = null;
let selectedMeal = '중식';

const grid = document.getElementById('calGrid');

for (let i = 0; i < FIRST_DOW; i++) {
  const e = document.createElement('div');
  e.className = 'day empty';
  grid.appendChild(e);
}

for (let d = 1; d <= 30; d++) {
  const dow = (FIRST_DOW + d - 1) % 7;
  const cell = document.createElement('div');
  cell.className = 'day' + (d === TODAY ? ' today' : '') + (dow === 0 ? ' sun' : dow === 6 ? ' sat' : '');
  cell.id = `day-cell-${d}`;
  cell.onclick = () => selectDay(d);
  grid.appendChild(cell);
}

function updateCalendarStars() {
  for (let d = 1; d <= 30; d++) {
    const cell = document.getElementById(`day-cell-${d}`);
    if (!cell) continue;
    const bStars = getStarCount(d, '조식');
    const lStars = getStarCount(d, '중식');
    const dStars = getStarCount(d, '석식');
    cell.innerHTML = `
      <div class="day-num">${d}</div>
      <div class="day-stars-summary">
        <div class="summary-line ${bStars > 0 ? 'has-stars' : ''}">🌅 ${bStars}</div>
        <div class="summary-line ${lStars > 0 ? 'has-stars' : ''}">☀️ ${lStars}</div>
        <div class="summary-line ${dStars > 0 ? 'has-stars' : ''}">🌙 ${dStars}</div>
      </div>
    `;
  }
}

function selectDay(d) {
  selectedDay = d;
  document.querySelectorAll('.day').forEach((el) => {
    if (el.id === `day-cell-${d}`) el.classList.add('selected');
    else el.classList.remove('selected');
  });
  document.getElementById('mainContent').style.display = 'grid';
  renderDetail();
  connectCommentRoom();
}

function getStarCount(day, meal) {
  let count = 0;
  if (!meals[meal] || !meals[meal][day]) return 0;
  meals[meal][day].items.forEach(item => {
    const key = `${day}-${meal}-${item}`;
    if (favorites[key]) count++;
  });
  return count;
}

function toggleFavorite(day, meal, item) {
  const key = `${day}-${meal}-${item}`;
  favorites[key] = !favorites[key];
  localStorage.setItem('pungsan_meal_favs', JSON.stringify(favorites));
  updateCalendarStars();
  renderDetail();
}

function renderDetail() {
  const d = selectedDay;
  const dow = DOW[(FIRST_DOW + d - 1) % 7];
  const data = meals[selectedMeal][d];
  const tabClasses = { '조식': 'active-b', '중식': 'active-l', '석식': 'active-d' };
  
  const tabs = ['조식','중식','석식'].map(m => {
    const stars = getStarCount(d, m);
    return `<button class="tab${m===selectedMeal?' '+tabClasses[m]:''}" onclick="switchMeal('${m}')">${m} ${stars>0?`<span class="tab-stars">★${stars}</span>`:''}</button>`;
  }).join('');
  
  let rows = '';
  if (data) {
    rows = data.items.map(item => {
      const isFav = !!favorites[`${d}-${selectedMeal}-${item}`];
      return `
        <div class="menu-row ${isFav ? 'favorite' : ''}" onclick="toggleFavorite(${d}, '${selectedMeal}', '${item}')">
          <div class="menu-left"><span class="star-icon">★</span><span class="menu-name">${cleanName(item)}</span></div>
          ${getAllergy(item) ? `<span class="allergy">${getAllergy(item)}</span>` : ''}
        </div>
      `;
    }).join('');
  } else {
    rows = '<div class="no-meal">해당 식사 정보가 없어요</div>';
  }
  document.getElementById('detail').innerHTML = `
    <div class="detail-header"><span class="detail-date">6월 ${d}일 (${dow})</span></div>
    <div class="meal-tabs">${tabs}</div>
    <div class="menu-list">${rows}</div>
  `;
}

function switchMeal(m) {
  selectedMeal = m;
  renderDetail();
  connectCommentRoom();
}

function connectCommentRoom() {
  if (!client) {
    console.warn("Liveblocks가 아직 초기화되지 않았습니다");
    return;
  }
  
  if (currentRoom) { client.leaveRoom(currentRoom.id); }
  
  const mealEng = selectedMeal === '조식' ? 'brk' : selectedMeal === '중식' ? 'lun' : 'din';
  const roomId = `pungsan-june-${selectedDay}-${mealEng}`;
  
  document.getElementById('commentList').innerHTML = '<div class="no-comments">댓글 불러오는 중...</div>';
  
  try {
    currentRoom = client.enterRoom(roomId, { initialStorage: { comments: new Liveblocks.LiveList() } });
    
    currentRoom.getStorage().then((storage) => {
      roomStorage = storage;
      const list = storage.root.get("comments");
      
      currentRoom.subscribe(list, () => { renderComments(list.toArray()); });
      renderComments(list.toArray());
    }).catch(err => {
      console.error("Liveblocks 연결 오류:", err);
      document.getElementById('commentList').innerHTML = '<div class="no-comments">댓글을 불러올 수 없어요</div>';
    });
  } catch(err) {
    console.error("댓글 연결 오류:", err);
  }
}

function renderComments(cmtArray) {
  const listEl = document.getElementById('commentList');
  if (!cmtArray || cmtArray.length === 0) {
    listEl.innerHTML = '<div class="no-comments">아직 등록된 한줄평이 없어요.<br>첫 댓글을 남겨보세요!</div>';
    return;
  }
  listEl.innerHTML = cmtArray.map(c => `
    <div class="comment-item">
      <div class="comment-meta"><span>👤 ${c.nick}</span> <span>${c.time || ''}</span></div>
      <div>${escapeHtml(c.text)}</div>
    </div>
  `).join('');
  listEl.scrollTop = listEl.scrollHeight;
}

function jsAddComment() {
  const input = document.getElementById('commentInput');
  const txt = input.value.trim();
  if (!txt || !roomStorage) return;
  
  const list = roomStorage.root.get("comments");
  const now = new Date();
  const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
  
  list.push({ nick: myNick, text: txt, time: timeStr });
  input.value = '';
}

function escapeHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

updateCalendarStars();

    console.log("✅ Liveblocks 초기화 완료");
    if (TODAY) selectDay(TODAY);
  } else {
